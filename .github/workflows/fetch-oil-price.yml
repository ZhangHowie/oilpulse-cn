name: 采集油价数据

on:
  schedule:
    # 北京时间 06:00 = UTC 22:00（前一天）
    - cron: '0 22 * * *'
    # 北京时间 22:00 = UTC 14:00（当天）
    - cron: '0 14 * * *'
  workflow_dispatch: {}   # 支持手动触发，便于调试

permissions:
  contents: write

concurrency:
  group: fetch-oil-price
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取油价数据
        env:
          MXNZP_APP_ID: ${{ secrets.MXNZP_APP_ID }}
          MXNZP_APP_SECRET: ${{ secrets.MXNZP_APP_SECRET }}
        run: python scripts/fetch_oil_price.py

      - name: 提交并推送变更
        run: |
          git config user.name "oilpulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "无数据变化，跳过提交"
          else
            git commit -m "chore: 更新油价数据 $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
